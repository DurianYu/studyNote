<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>杜青林大冒险 1000层挑战</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none; user-select: none;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        /* HUD 抬头显示 */
        #hud {
            position: absolute; top: 20px; right: 30px;
            font-size: 40px; font-weight: bold; color: #fff;
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            display: none; font-family: 'Impact', sans-serif;
        }
        .screen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.7); width: 100%; height: 100%; pointer-events: auto;
        }
        /* 开始界面 */
        #start-screen h1 {
            font-size: 50px; color: #90EE90; /* 宫崎骏风格的自然绿 */
            text-shadow: 4px 4px 0px #228B22; margin-bottom: 50px; text-align: center;
        }
        .blink {
            animation: blinker 1s linear infinite; font-size: 24px; color: #fff;
            cursor: pointer; padding: 15px 30px; border: 3px solid #fff; background: #333;
        }
        @keyframes blinker { 50% { opacity: 0; } }
        /* 结算界面 */
        #game-over-screen { display: none; }
        #game-over-screen h1 {
            font-size: 80px; color: #8a0303; font-family: 'Impact', sans-serif;
            text-transform: uppercase; text-shadow: 0 0 20px #ff0000, 4px 4px 0 #000;
            margin-bottom: 40px; letter-spacing: 8px;
        }
        /* 胜利界面 */
        #win-screen { display: none; }
        #win-screen h1 {
            font-size: 60px; color: #FFD700; text-shadow: 2px 2px 10px #fff; margin-bottom: 40px; text-align: center;
        }
        button {
            padding: 15px 40px; font-size: 24px; background-color: #333; color: white;
            border: 2px solid white; cursor: pointer; font-family: inherit; transition: 0.2s;
        }
        button:hover { background-color: #fff; color: #000; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="hud">FLOOR: <span id="level-counter" style="color:#FFD700;">0</span>/1000</div>
        
        <div id="start-screen" class="screen">
            <h1>杜青林大冒险</h1>
            <div class="blink" id="start-btn">INSERT COIN / START</div>
        </div>

        <div id="game-over-screen" class="screen">
            <h1>You are dead</h1>
            <button id="retry-btn">重 试</button>
        </div>

        <div id="win-screen" class="screen">
            <h1>THE LEGEND OF DU QINGLIN</h1>
            <p style="color:white; font-size:24px; margin-bottom: 30px;">恭喜！你成功突破了 1000 层！</p>
            <button id="win-retry-btn">再创辉煌</button>
        </div>
    </div>

// --- Web Audio 音效系统 ---
class AudioSystem {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.4;
        this.masterGain.connect(this.ctx.destination);
        this.isPlayingBGM = false;

        // 预解码用户提供的音频
        if (NIUBILITY_AUDIO_BASE64) {
            this.decodeBase64(NIUBILITY_AUDIO_BASE64);
        }
    }

    async decodeBase64(base64) {
        try {
            const base64Data = base64.split(',')[1];
            const binaryString = window.atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            this.decodedBuffer = await this.ctx.decodeAudioData(bytes.buffer);
            console.log("道具语音加载成功！");
        } catch (e) {
            console.error("音频解码失败，请检查 Base64 格式", e);
        }
    }

    playNiubility() {
        if (this.decodedBuffer) {
            const source = this.ctx.createBufferSource();
            source.buffer = this.decodedBuffer;
            source.connect(this.masterGain);
            source.start(0);
        } else {
            // 如果没加载成功，播放备用合成音
            this.playSound('item');
        }
    }

    playSound(type) {
        setTimeout(() => {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.masterGain);
            const now = this.ctx.currentTime;
            
            switch(type) {
                case 'jump':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                    gain.gain.setValueAtTime(0.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                    break;
                case 'fart': 
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(90, now);
                    osc.frequency.linearRampToValueAtTime(30, now + 0.3);
                    gain.gain.setValueAtTime(0.7, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                    break;
                case 'laugh': 
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(500, now);
                    osc.frequency.setValueAtTime(800, now + 0.1);
                    osc.frequency.setValueAtTime(500, now + 0.2);
                    osc.frequency.setValueAtTime(900, now + 0.3);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                    break;
                case 'lightning': 
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.exponentialRampToValueAtTime(10, now + 0.5);
                    gain.gain.setValueAtTime(0.8, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                    break;
                case 'item': // 道具高能音效
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.exponentialRampToValueAtTime(1760, now + 0.2);
                    gain.gain.setValueAtTime(0.6, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                    
                    // 添加和弦
                    const osc2 = this.ctx.createOscillator();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(660, now);
                    osc2.frequency.exponentialRampToValueAtTime(2640, now + 0.2);
                    osc2.connect(gain);
                    osc2.start(now); osc2.stop(now + 0.4);
                    
                    osc.start(now); osc.stop(now + 0.4);
                    break;
                case 'burn': // 火山燃烧音效
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(50, now);
                    osc.frequency.linearRampToValueAtTime(10, now + 0.4);
                    gain.gain.setValueAtTime(0.8, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                    break;
            }
        }, audioVideoSyncDelay);
    }

    startBGM() {
        if (this.isPlayingBGM) return;
        this.isPlayingBGM = true;
        
        const melody = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63]; 
        const bass = [130.81, 130.81, 174.61, 196.00]; 
        let noteIdx = 0, bassIdx = 0;
        
        this.bgmInterval = setInterval(() => {
            if(!this.isPlayingBGM) return;
            const now = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'square';
            osc.frequency.value = melody[noteIdx % melody.length];
            osc.connect(gain); gain.connect(this.masterGain);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(now); osc.stop(now + 0.15);
            noteIdx++;

            if(noteIdx % 2 === 0) {
                const bOsc = this.ctx.createOscillator();
                const bGain = this.ctx.createGain();
                bOsc.type = 'triangle';
                bOsc.frequency.value = bass[bassIdx % bass.length];
                bOsc.connect(bGain); bGain.connect(this.masterGain);
                bGain.gain.setValueAtTime(0.2, now);
                bGain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                bOsc.start(now); bOsc.stop(now + 0.3);
                bassIdx++;
            }
        }, 200);
    }

    stopBGM() {
        this.isPlayingBGM = false;
        clearInterval(this.bgmInterval);
    }
}
let audio;

// --- 游戏实体 ---

class Player {
    constructor() { this.reset(); }

    reset() {
        this.baseWidth = 30; this.baseHeight = 40;
        this.width = this.baseWidth; this.height = this.baseHeight;
        this.x = cw / 2 - this.width / 2;
        this.y = ch - 150;
        this.vx = 0; this.vy = 0;
        this.speed = 0.6; this.maxSpeed = 8;
        this.friction = 0.85; 
        this.gravity = 0.4;
        this.bouncePower = -12.5;
        
        // 道具状态
        this.isRocket = false; this.rocketTimer = 0;
        this.isImmune = false; this.immuneTimer = 0;
        this.isBig = false; this.bigTimer = 0;
        
        // 炫彩文字特效
        this.showTextTimer = 0;
    }

    update(dt) {
        // 移动
        let moving = false;
        if (keys.a || keys.ArrowLeft || touchX === 'left') { this.vx -= this.speed; moving = true; }
        if (keys.d || keys.ArrowRight || touchX === 'right') { this.vx += this.speed; moving = true; }

        if (this.vx > this.maxSpeed) this.vx = this.maxSpeed;
        if (this.vx < -this.maxSpeed) this.vx = -this.maxSpeed;
        if (!moving) this.vx *= this.friction;

        // 状态更新
        if (this.isRocket) {
            this.vy = -20; // 火箭高速
            this.rocketTimer -= dt;
            if (this.rocketTimer <= 0) this.isRocket = false;
            // 尾焰
            particles.push(new Particle(this.x + this.width/2, this.y + this.height, '#FF4500', 4, 2));
            particles.push(new Particle(this.x + this.width/2, this.y + this.height, '#FFD700', 2, 1));
        } else {
            this.vy += this.gravity;
        }

        if (this.isImmune) {
            this.immuneTimer -= dt;
            if (this.immuneTimer <= 0) this.isImmune = false;
        }
        if (this.isBig) {
            this.width = this.baseWidth * 1.5; this.height = this.baseHeight * 1.5;
            this.bigTimer -= dt;
            if (this.bigTimer <= 0) {
                this.isBig = false; this.width = this.baseWidth; this.height = this.baseHeight;
            }
        }
        if (this.showTextTimer > 0) {
            this.showTextTimer -= dt;
        }

        this.x += this.vx; this.y += this.vy;

        // 环绕穿越
        if (this.x > cw) this.x = -this.width;
        if (this.x < -this.width) this.x = cw;

        // 摄像机
        let screenY = this.y - cameraY;
        if (screenY < ch * 0.4) {
            cameraY = this.y - ch * 0.4;
        }

        // 碰撞检测 (仅向下落时)
        if (this.vy > 0 && !this.isRocket) {
            for (let p of platforms) {
                // 遍历平台的所有区块 (处理镂空)
                for (let rect of p.rects) {
                    if (this.x < rect.x + rect.w &&
                        this.x + this.width > rect.x &&
                        this.y + this.height > p.y &&
                        this.y + this.height - this.vy <= p.y + 12) {
                        
                        // 踩中火山！
                        if (p.type === 'VOLCANO' && !this.isImmune) {
                            audio.playSound('burn');
                            for(let i=0; i<20; i++) particles.push(new Particle(this.x+15, this.y+20, '#FF0000', 5, 2));
                            gameOver();
                            return;
                        }

                        this.y = p.y - this.height;
                        this.vy = this.bouncePower;
                        
                        this.friction = 0.85; 
                        if (!this.isImmune) {
                            if (p.type === 'WETLAND') this.friction = 0.4; 
                            if (p.type === 'SNOW') this.friction = 0.99; 
                        }

                        if(p.floorNumber > maxFloorReached) {
                            maxFloorReached = p.floorNumber;
                            document.getElementById('level-counter').innerText = maxFloorReached;
                            if(maxFloorReached >= MAX_FLOORS) winGame();
                        }

                        createRipple(this.x + this.width/2, this.y + this.height);
                        
                        const sfxList = ['fart', 'lightning', 'laugh'];
                        if(Math.random() < 0.2) audio.playSound(sfxList[Math.floor(Math.random() * sfxList.length)]);
                        else audio.playSound('jump');
                        
                        break; // 踩中一个区块就跳出
                    }
                }
            }
        }

        // 道具碰撞
        for (let i = items.length - 1; i >= 0; i--) {
            let item = items[i];
            if (this.x < item.x + item.width && this.x + this.width > item.x &&
                this.y < item.y + item.height && this.y + this.height > item.y) {
                
                // audio.playSound('item');
                audio.playNiubility();
                this.showTextTimer = 2500; // 显示炫彩文字 2.5秒

                if(item.type === 'ROCKET') {
                    this.isRocket = true; this.rocketTimer = 2500; 
                } else if(item.type === 'STAR') {
                    this.isImmune = true; this.immuneTimer = 6000; 
                } else if(item.type === 'MUSHROOM') {
                    this.isBig = true; this.bigTimer = 6000; 
                }
                items.splice(i, 1);
            }
        }

        // 坠落死亡
        if (this.y > cameraY + ch + 100) gameOver();
    }

    draw(ctx, time) {
        let drawX = this.x; let drawY = this.y - cameraY;
        ctx.save();
        ctx.translate(drawX + this.width/2, drawY + this.height);
        ctx.rotate((this.vx * 0.05));
        
        // 宫崎骏画风角色 (绿色基底)
        ctx.fillStyle = this.isImmune ? '#FFD700' : '#8FBC8F'; 
        ctx.beginPath();
        ctx.arc(0, -this.height/2, this.width/2, 0, Math.PI*2);
        ctx.fill();
        
        ctx.fillStyle = '#FFE4C4';
        ctx.beginPath();
        ctx.arc(0, -this.height/1.4, this.width/2.2, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(-5, -this.height/1.4 - 2, 2.5, 0, Math.PI*2);
        ctx.arc(5, -this.height/1.4 - 2, 2.5, 0, Math.PI*2);
        ctx.fill();

        if(this.isBig) {
            ctx.fillStyle = 'rgba(255, 105, 180, 0.4)';
            ctx.beginPath();
            ctx.arc(0, -this.height/2, this.width, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.restore();

        // 炫彩文字 "杜青林大牛笔"
        if (this.showTextTimer > 0) {
            ctx.save();

            // 1. 计算动画参数
            const now = Date.now();
            // 随时间变化的色相 (0-360)
            const hue = (now / 5) % 360;
            // 缩放比例，产生“呼吸”脉动效果
            const scale = 1 + Math.sin(now / 150) * 0.15;

            // 2. 坐标变换
            const textX = drawX + this.width / 2;
            const textY = drawY - 30 - Math.abs(Math.sin(now / 300)) * 15; // 加上下漂浮效果
            ctx.translate(textX, textY);
            ctx.scale(scale, scale);

            // 3. 绘制外发光 (Glow Effect)
            ctx.shadowBlur = 25; // 模糊范围
            ctx.shadowColor = `hsl(${hue}, 100%, 70%)`; // 亮色霓虹感

            // 4. 绘制底层彩色字
            ctx.font = "italic bold 34px 'Microsoft YaHei', sans-serif";
            ctx.textAlign = "center";
            ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
            ctx.fillText("杜青林大牛笔!", 0, 0);

            // 5. 叠加一层白色核心（让光看起来是从中间发出来的）
            ctx.shadowBlur = 0; // 核心字不需要再次发光
            ctx.fillStyle = "#FFFFFF";
            ctx.font = "italic bold 30px 'Microsoft YaHei', sans-serif";
            ctx.fillText("杜青林大牛笔!", 0, 0);

            // 6. 装饰性小星星（可选：在文字周围随机画点闪光）
            for (let i = 0; i < 3; i++) {
                let starX = (Math.random() - 0.5) * 120;
                let starY = (Math.random() - 0.5) * 40;
                let size = Math.random() * 3;
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(starX, starY, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }
    }
}

class Platform {
    constructor(x, y, floorNumber, width) {
        this.y = y;
        this.height = 15;
        this.floorNumber = floorNumber;
        this.rects = []; // 存储碰撞区块，方便做镂空

        // 地形难度与类型分配
        let diff = Math.min(1, floorNumber / MAX_FLOORS); // 0 到 1
        let r = Math.random();
        
        // 类型权重
        if (r < 0.1) this.type = 'WETLAND';
        else if (r < 0.2) this.type = 'SNOW';
        else if (r < 0.2 + (0.15 * diff) && floorNumber > 20) this.type = 'VOLCANO'; // 随层数增加
        else if (r < 0.3 + (0.2 * diff) && floorNumber > 50) this.type = 'HOLLOW'; // 中间镂空
        else this.type = 'NORMAL';

        // 长度变化 (长的/短的)
        let wMult = 1;
        if (this.type === 'NORMAL') {
            if (Math.random() < 0.2) wMult = 0.5; // 短
            else if (Math.random() < 0.2) wMult = 1.5; // 长
        }

        let finalWidth = width * wMult;

        // 构建区块
        if (this.type === 'HOLLOW' && finalWidth > 60) {
            let gap = 30 + Math.random() * 20;
            let partW = (finalWidth - gap) / 2;
            this.rects.push({x: x, w: partW});
            this.rects.push({x: x + partW + gap, w: partW});
            this.totalWidth = finalWidth;
        } else {
            this.rects.push({x: x, w: finalWidth});
            this.totalWidth = finalWidth;
        }
    }

    draw(ctx, time) {
        let drawY = this.y - cameraY;
        if (drawY > ch + 20 || drawY < -20) return;

        ctx.save();
        for (let rect of this.rects) {
            ctx.beginPath();
            ctx.roundRect(rect.x, drawY, rect.w, this.height, 8);
            
            if (this.type === 'NORMAL') {
                ctx.fillStyle = '#6B8E23'; // 宫崎骏苔藓绿
                ctx.fill();
            } else if (this.type === 'WETLAND') {
                ctx.fillStyle = '#5F9EA0'; // 湿地蓝灰
                ctx.fill();
            } else if (this.type === 'SNOW') {
                ctx.fillStyle = '#F0F8FF'; // 雪白
                ctx.fill();
            } else if (this.type === 'VOLCANO') {
                let grad = ctx.createLinearGradient(0, drawY, 0, drawY+this.height);
                grad.addColorStop(0, '#FF4500');
                grad.addColorStop(1, '#8B0000');
                ctx.fillStyle = grad;
                ctx.fill();
                // 偶尔喷火星
                if(Math.random() < 0.1) particles.push(new Particle(rect.x + Math.random()*rect.w, drawY, '#FFA500', 2, 0.5));
            } else if (this.type === 'HOLLOW') {
                ctx.fillStyle = '#8B4513'; // 木桥色
                ctx.fill();
            }
        }
        ctx.restore();
    }
}

class Item {
    constructor(x, y) {
        this.x = x; this.y = y; this.width = 25; this.height = 25;
        let r = Math.random();
        if(r < 0.2) this.type = 'ROCKET'; // 20%
        else if(r < 0.5) this.type = 'STAR'; // 30%
        else this.type = 'MUSHROOM'; // 50%
        this.floatOffset = Math.random() * Math.PI * 2;
    }
    draw(ctx, time) {
        let drawY = this.y - cameraY + Math.sin(time/200 + this.floatOffset) * 5;
        if (drawY > ch || drawY < -30) return;

        ctx.save();
        if (this.type === 'ROCKET') {
            ctx.fillStyle = '#FF4500';
            ctx.beginPath(); ctx.moveTo(this.x+this.width/2, drawY);
            ctx.lineTo(this.x+this.width, drawY+this.height); ctx.lineTo(this.x, drawY+this.height); ctx.fill();
        } else if (this.type === 'STAR') {
            ctx.fillStyle = '#FFD700'; ctx.translate(this.x+this.width/2, drawY+this.height/2);
            ctx.rotate(time/500);
            ctx.beginPath();
            for(let i=0;i<5;i++){ ctx.lineTo(Math.cos((18+i*72)*Math.PI/180)*12, -Math.sin((18+i*72)*Math.PI/180)*12); ctx.lineTo(Math.cos((54+i*72)*Math.PI/180)*5, -Math.sin((54+i*72)*Math.PI/180)*5); }
            ctx.closePath(); ctx.fill();
        } else if (this.type === 'MUSHROOM') {
            ctx.fillStyle = '#FF69B4'; ctx.beginPath();
            ctx.arc(this.x+this.width/2, drawY+this.height/2, 12, Math.PI, 0); ctx.fill();
            ctx.fillStyle = '#FFF'; ctx.fillRect(this.x+this.width/2-5, drawY+this.height/2, 10, 10);
        }
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color, size, life) {
        this.x = x; this.y = y; this.color = color; this.size = size;
        this.life = life; this.maxLife = life;
        this.vx = (Math.random() - 0.5) * 3; this.vy = (Math.random() - 0.5) * 3;
    }
    update(dt) { this.x += this.vx; this.y += this.vy; this.life -= dt * 0.003; this.size *= 0.95; }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = this.color; ctx.beginPath();
        ctx.arc(this.x, this.y - cameraY, this.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

class Ripple {
    constructor(x, y) { this.x = x; this.y = y; this.radius = 5; this.life = 1; }
    update(dt) { this.radius += dt * 0.15; this.life -= dt * 0.003; }
    draw(ctx) {
        ctx.save(); ctx.globalAlpha = Math.max(0, this.life);
        ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4; ctx.beginPath();
        ctx.ellipse(this.x, this.y - cameraY, this.radius, this.radius * 0.3, 0, 0, Math.PI*2);
        ctx.stroke(); ctx.restore();
    }
}

let player, platforms = [], items = [], particles = [], ripples = [], highestPlatformY = ch;

// --- 必定可跳跃的平台生成逻辑 ---
function generatePlatform() {
    let lastP = platforms.length > 0 ? platforms[platforms.length - 1] : {rects: [{x: cw/2-40, w: 80}], y: ch-50};
    
    // 取上一个平台的最中间点作为基准
    let lastCenterX = lastP.rects[0].x + lastP.rects[0].w / 2;

    // 根据层数增加垂直间距，但设置安全极限
    // 杜青林初速度12.5，重力0.4，理论极限高度约为 195。保守设定最大间距为 150。
    let baseGap = 50;
    let maxExtraGap = Math.min(100, maxFloorReached * 0.2); // 层数越高间距越大
    let gapY = baseGap + Math.random() * maxExtraGap;
    
    highestPlatformY -= gapY;

    // 宽度随层数缩减
    let baseWidth = Math.max(50, 100 - (maxFloorReached * 0.05));
    
    // 水平偏移计算。杜青林横向满速8，滞空时间约60帧，理论水平极限480。保守设定160。
    let maxHorizontalJump = 160; 
    let offsetX = (Math.random() - 0.5) * 2 * maxHorizontalJump; 
    let x = lastCenterX + offsetX - baseWidth / 2;

    // 屏幕边缘环绕处理
    if (x < 0) x += cw;
    else if (x > cw - baseWidth) x -= cw;
    
    let floorNum = platforms.length;
    let p = new Platform(x, highestPlatformY, floorNum, baseWidth);
    platforms.push(p);

    // 道具生成 (8% 概率)
    if(Math.random() < 0.08 && floorNum > 10) {
        let targetRect = p.rects[Math.floor(Math.random() * p.rects.length)];
        items.push(new Item(targetRect.x + targetRect.w/2 - 12, highestPlatformY - 30));
    }
}

function initGame() {
    player = new Player();
    platforms = []; items = []; particles = []; ripples = [];
    cameraY = player.y - ch/2;
    maxFloorReached = 0; highestPlatformY = ch;
    document.getElementById('level-counter').innerText = 0;
    
    // 初始地面
    let startPlatform = new Platform(cw/2 - 60, ch - 50, 0, 120);
    startPlatform.type = 'NORMAL';
    platforms.push(startPlatform);
    highestPlatformY = ch - 50;

    // 预生成两屏幕高度的地形（防止火箭飞太快断层）
    while(highestPlatformY > cameraY - ch * 2) generatePlatform();

    gameState = 'PLAYING';
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById('hud').style.display = 'block';

    if(!audio) audio = new AudioSystem();
    audio.startBGM();

    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
}

function createRipple(x, y) { ripples.push(new Ripple(x, y)); }

function gameOver() {
    gameState = 'GAMEOVER'; audio.stopBGM();
    document.getElementById('game-over-screen').style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
}

function winGame() {
    gameState = 'WIN'; audio.stopBGM();
    document.getElementById('win-screen').style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
}

function drawBackground() {
    let tier = Math.floor(maxFloorReached / 200); // 每200层换背景
    let grad = ctx.createLinearGradient(0, 0, 0, ch);
    
    if(tier === 0) { // 蓝天白云 (0-199)
        grad.addColorStop(0, '#87CEEB'); grad.addColorStop(1, '#E0F6FF');
    } else if(tier === 1) { // 大气层 (200-399)
        grad.addColorStop(0, '#4682B4'); grad.addColorStop(1, '#87CEEB');
    } else if(tier === 2) { // 外太空 (400-599)
        grad.addColorStop(0, '#000033'); grad.addColorStop(1, '#4682B4');
    } else if(tier === 3) { // 月球 (600-799)
        grad.addColorStop(0, '#222'); grad.addColorStop(1, '#555');
    } else { // 太阳系 (800-1000+)
        grad.addColorStop(0, '#100020'); grad.addColorStop(1, '#300000');
    }
    ctx.fillStyle = grad; ctx.fillRect(0, 0, cw, ch);

    // 星星点缀
    if (tier >= 2) {
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        for(let i=0; i<80; i++) {
            let sx = (Math.sin(i*73) * 10000) % cw; if(sx < 0) sx += cw;
            let sy = (i * 30 - cameraY * 0.1) % ch; if(sy < 0) sy += ch;
            ctx.fillRect(sx, sy, Math.random()*2+1, Math.random()*2+1);
        }
    }
}

function gameLoop(timestamp) {
    if (gameState !== 'PLAYING') return;
    let dt = timestamp - lastTime; lastTime = timestamp;

    ctx.clearRect(0, 0, cw, ch);
    drawBackground();

    // 火箭飞行极快，预生成两倍屏幕高度确保不空
    while(highestPlatformY > cameraY - ch * 2) generatePlatform();

    // 回收屏幕下方对象
    platforms = platforms.filter(p => p.y < cameraY + ch + 100);
    items = items.filter(item => item.y < cameraY + ch + 100);
    particles = particles.filter(p => p.life > 0);
    ripples = ripples.filter(r => r.life > 0);

    player.update(dt);
    
    platforms.forEach(p => p.draw(ctx, timestamp));
    items.forEach(item => item.draw(ctx, timestamp));
    ripples.forEach(r => { r.update(dt); r.draw(ctx); });
    particles.forEach(p => { p.update(dt); p.draw(ctx); });
    
    player.draw(ctx, timestamp);

    requestAnimationFrame(gameLoop);
}

window.addEventListener('resize', () => { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; });
window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; if(e.key.toLowerCase()==='a') keys.a=true; if(e.key.toLowerCase()==='d') keys.d=true; });
window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; if(e.key.toLowerCase()==='a') keys.a=false; if(e.key.toLowerCase()==='d') keys.d=false; });
window.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX < cw / 2 ? 'left' : 'right'; });
window.addEventListener('touchend', () => { touchX = null; });

document.getElementById('start-btn').addEventListener('click', initGame);
document.getElementById('retry-btn').addEventListener('click', initGame);
document.getElementById('win-retry-btn').addEventListener('click', initGame);

CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
    this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r); this.arcTo(x, y, x + w, y, r); this.closePath(); return this;
}
